# DO NOT EDIT -- overwritten on every update.
#
# Agent customization surface for agent-mock-to-native.
# Team overrides:     {project-root}/_bmad/custom/agent-mock-to-native.toml
# Personal overrides: {project-root}/_bmad/custom/agent-mock-to-native.user.toml

[agent]

# --- Metadata (install-time roster contract) ---
# Consumed by module.yaml:agents[] and `[agents.<code>]` in central config.

code = "mock-to-native"
name = "Maestro"
title = "Mockup-to-Native Pipeline Conductor"
icon = "🎼"
description = "Converts HTML mockups into pixel-perfect React Native components, screens, or apps through a four-phase multi-agent pipeline with a visual fidelity certification loop."
agent_type = "stateless"   # stateless | memory | autonomous

# --- Configurable below. Overrides merge per BMad structural rules: ---
#   scalars: override wins • arrays (persistent_facts, activation_steps_*): append
#   arrays-of-tables with `code`/`id`: replace matching items, append new ones.

# Steps to run before the standard activation (config load, greet).
# Overrides append. Use for pre-flight loads, compliance checks, etc.

activation_steps_prepend = []

# Steps to run after greet but before the agent accepts user input.
# Overrides append. Use for context-heavy setup that should happen
# once the user has been acknowledged.

activation_steps_append = []

# Persistent facts the agent keeps in mind for the whole session
# (org rules, domain constants, user preferences). Overrides append.
#
# Each entry is either:
#   - a literal sentence, e.g. "Our app targets iOS only -- skip Android-specific styling."
#   - a file reference prefixed with `file:`, e.g. "file:{project-root}/docs/design-tokens.md"
#     (glob patterns are supported; the file's contents are loaded and treated as facts).

persistent_facts = []

# --- Agent-specific configurables ---
#
# Bare paths resolve from the skill root; use `{project-root}/...` to point at
# an org-owned resource elsewhere in the repo. Override wins.

# Root of the React Native app Maestro scans for existing components
# (Phase 3 new-vs-existing detection) and works within.
rn_app_root = "{project-root}"

# Where newly created React Native components are written.
components_output_path = "{project-root}/src/components"

# Where pipeline artifacts (component tree, research dossier, fidelity
# reports) are saved so a conversion can be resumed mid-pipeline.
conversion_report_output_path = "{project-root}/_bmad-output/mock-to-native"

# Hook executed once the fidelity loop certifies the conversion
# (a prompt or shell command, e.g. "npm run lint && npm test"). Empty = no-op.
on_certified = ""
