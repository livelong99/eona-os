# Agent Home — Hermes engine config (TEMPLATE)
# ---------------------------------------------------------------------------
# This is a STARTING TEMPLATE. Exact key names may differ by Hermes version
# (the research notes fast naming drift). After `hermes` is installed, verify
# every key against:  hermes config --help   and   ~/.hermes/config.yaml
# Copy the verified result to ~/.hermes/config.yaml (NOT committed with secrets).
# Secrets live in ~/.hermes/.env (see .env.example) — never inline here.
# ---------------------------------------------------------------------------

# --- Gateway / dispatcher -----------------------------------------------------
gateway:
  host: 127.0.0.1          # NEVER 0.0.0.0 without TLS + auth
  port: 8642

kanban:
  dispatch_in_gateway: true
  tick_seconds: 60

# --- Goal Mode ----------------------------------------------------------------
goals:
  max_turns: 20
  judge_model: gemini-flash   # cheap judge (Tier C Flash) — ~80% cost cut

# --- Delegation ("Hive") ------------------------------------------------------
delegation:
  max_concurrent_children: 8
  max_spawn_depth: 2

# --- Provider mesh (three tiers; only paid = Claude sub + Gemini key) ---------
# Tier A = Ollama (native, free, optional) · Tier C = Gemini (API)
# Tier D = Claude Code CLI (runtime, not a model here)
# Hostnames assume the Docker stack: host.docker.internal reaches host-native
# services (Ollama, Obsidian). When running Hermes natively, use 127.0.0.1.
providers:
  # Tier A — local, no key, private. Optional (run Ollama native for Metal GPU).
  ollama:
    type: openai_compatible
    base_url: http://host.docker.internal:11434/v1
    models: [gemma3, llama3.1]   # verify tags you've pulled: `ollama list`

  # Tier C — Gemini. Flash = judge/high-freq; Pro = heavy; Prompt Foundry.
  gemini:
    type: openai_compatible
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    api_key_env: GEMINI_API_KEY
    models: [gemini-flash, gemini-pro]        # verify current IDs in ai.google.dev

  # Tier D (Claude) is a RUNTIME, not a provider model — Hermes reaches it via
  # terminal/CLI delegation; it shares memory through the Obsidian MCP.

# --- Routing policy -----------------------------------------------------------
# cheap-first, judge-gated. No external promo/free-cloud models (dropped).
routing:
  order: [ollama, gemini, claude_code]   # ollama optional; falls through if absent
  escalate_on: judge_fail

# --- Shared memory (Obsidian) + OSS tools (self-hosted Docker) -----------------
mcp_servers:
  obsidian:
    # Obsidian Local REST API plugin on the HOST (:27123).
    # API key stored as MCP_OBSIDIAN_API_KEY in ~/.hermes/.env (Bearer stripped).
    base_url: http://host.docker.internal:27123
    api_key_env: MCP_OBSIDIAN_API_KEY
    vault_scope: "10_Projects/agent-home"   # agents never roam the whole vault
  qdrant:
    # Vector memory for semantic recall over the vault (Docker service).
    base_url: http://qdrant:6333

# --- Tools (self-hosted OSS; no paid SaaS). Wire as search/scrape skills. ------
tools:
  search:
    provider: searxng
    base_url: http://searxng:8080      # JSON format enabled in infra/searxng/settings.yml
  scrape:
    provider: crawl4ai
    base_url: http://crawl4ai:11235

# --- Profiles (= our agents). Personas live in ./profiles/*.md ----------------
profiles:
  researcher: { provider: gemini,   model: gemini-pro,   persona: profiles/researcher.md }
  writer:     { provider: gemini,   model: gemini-pro,   persona: profiles/writer.md }
  seo:        { provider: gemini,   model: gemini-flash, persona: profiles/seo.md }
  judge:      { provider: gemini,   model: gemini-flash, persona: profiles/judge.md }
  prompt-writer: { provider: gemini, model: gemini-pro,  persona: profiles/prompt-writer.md, skill: prompt-foundry }
  prompt-judge:  { provider: gemini, model: gemini-flash, persona: profiles/judge.md }
