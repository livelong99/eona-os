# Agent Home — Hermes config (~/.hermes/config.yaml). Real schema per
# github.com/NousResearch/hermes-agent (cli-config.yaml.example + docs).
# Secrets live in hermes/.env (see .env.example) — never inline here.
# After install, reconcile against:  hermes config schema  /  /api/config/schema.

# --- Providers & routing ------------------------------------------------------
# Claude is the ONLY model/runtime. Turns are delegated to the local `claude`
# CLI via the "claude_code" runtime (api_mode: claude_code), which uses your
# Claude Code SUBSCRIPTION (CLAUDE_CODE_OAUTH_TOKEN — run `claude setup-token`),
# so there is NO per-token API cost. No Gemini, no OpenRouter, no local models.
# Set CLAUDE_CODE_OAUTH_TOKEN in ~/.hermes/.env. Swap to claude-opus-4-8 for Opus.
#
# api_mode defaults to "claude_code" in the engine (gateway/run.py reads the
# HERMES_API_MODE env var, default "claude_code"). Setting it here makes the
# Claude-only runtime explicit and is the documented override point.
model:
  provider: auto # auto-detects claude_code from CLAUDE_CODE_OAUTH_TOKEN
  default: "anthropic/claude-sonnet-4-6" # or "anthropic/claude-opus-4-8"
  api_mode: claude_code # delegate turns to the local `claude` CLI runtime

# --- Agent behavior -----------------------------------------------------------
agent:
  max_turns: 60
  reasoning_effort: medium

# --- Delegation ("Hive") ------------------------------------------------------
delegation:
  max_iterations: 8
  max_concurrent_children: 8

# --- Memory -------------------------------------------------------------------
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 1300

# --- Execution environment ----------------------------------------------------
terminal:
  backend: local # inside the Hermes container

# --- Security -----------------------------------------------------------------
security:
  tirith_enabled: true # pre-exec command scanning

# --- API server (OpenAI-compatible; the dashboard talks to this) --------------
# Host is set via API_SERVER_HOST env (0.0.0.0 in-container; host exposure is the
# compose 127.0.0.1 publish). Port 8642.
platforms:
  api_server:
    enabled: true
    port: 8642

# --- MCP servers: shared memory + tools (verify shape vs `hermes` MCP docs) ----
mcp_servers:
  obsidian: # shared brain — Obsidian Local REST API plugin on the host
    command: npx
    args: ["-y", "obsidian-mcp-server"]
    env:
      OBSIDIAN_API_KEY: "${MCP_OBSIDIAN_API_KEY}"
      OBSIDIAN_BASE_URL: "http://host.docker.internal:27123"
      OBSIDIAN_VERIFY_SSL: "false"
  qdrant: # semantic memory (Docker service)
    url: "http://qdrant:6333"

# Search/scrape are skills (hermes/skills/web-search, web-scrape) that call the
# SearXNG (:8080) and Crawl4AI (:11235) containers — not config blocks.
# Personas in hermes/profiles/*.md map to each profile's SOUL.md (hermes profile create).
