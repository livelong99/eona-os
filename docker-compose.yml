# Agent Home — local stack. All published ports bound to 127.0.0.1 only.
# Host-native (NOT here): Obsidian (+Local REST :27123) and Claude Code CLI
# (PRIMARY provider) — reached from containers via host.docker.internal.
# No local models (Ollama removed); cheap/bulk tier is OpenRouter.
# Image tags marked "verify" should be pinned after first pull.

services:
  hermes:
    # Our fork: Hermes built from ./engine source (includes the claude_code
    # runtime) + the official `claude` CLI bundled. Claude is the only model.
    build:
      context: ./engine
    image: agent-home/hermes-claude-code:local
    container_name: agenthome-hermes
    restart: unless-stopped
    command: gateway run
    # Inject ~/.hermes/.env as real process env so os.getenv() sees API_SERVER_KEY
    # and CLAUDE_CODE_OAUTH_TOKEN (the api_server gate + claude CLI read process env).
    env_file:
      - path: ${HOME}/.hermes/.env
        required: false
    environment:
      - API_SERVER_ENABLED=1 # start the OpenAI-compatible API server on :8642 (the dashboard talks to it)
      - API_SERVER_HOST=0.0.0.0 # in-container bind; host exposure is the 127.0.0.1 publish below
      - API_SERVER_PORT=8642
      - HERMES_API_MODE=claude_code # default runtime = the local `claude` CLI (Claude-only)
      - CLAUDE_CONFIG_DIR=/opt/data/.claude # writable (volume) config dir for the claude CLI as UID 10000
      # HERMES_DASHBOARD (:9119) is intentionally OFF: its OAuth gate refuses a
      # non-loopback (container) bind without an auth provider. Our own dashboard
      # (:3737) uses the API server below.
      - SEARXNG_URL=http://searxng:8080
      - CRAWL4AI_URL=http://crawl4ai:11235
      - QDRANT_URL=http://qdrant:6333
      - CLAUDE_BRIDGE_URL=http://host.docker.internal:8765 # host-side Claude Code bridge
      # Tool manifests (os.pathsep-separated): built-in skills (read-only) + user-built
      # tools written by the Labs "UI Agent Builder" into the read-write ~/.hermes mount.
      - HERMES_TOOL_ROOTS=/opt/skills:/opt/data/skills
      # Where the Tool Forge writes NEW tools (the writable tool root above) + where
      # its own run sessions land. New tools are discovered on the next /v1/tools fetch.
      - HERMES_USER_TOOLS_ROOT=/opt/data/skills
      - HERMES_FORGE_ROOT=/opt/data/tool-forge
      # Obsidian vault, mounted read-only below — powers the Memory screen graph/search + Brain.
      - HERMES_VAULT_PATH=/vault
      - VAULT_DIR=/vault
      # Brainstorm swarm sessions land in the vault's read-WRITE Brainstorms subtree
      # (mounted below) so qna.json/readiness.json/prd.md are Obsidian-visible and
      # the /v1/tools/brainstorm/artifacts endpoints read them back.
      - HERMES_BRAINSTORM_ROOT=/vault/30_Resources/Brainstorms
      # Workspaces (the Architect-orchestrated SDLC pipeline) are cloned/copied into
      # the vault's read-WRITE 10_Projects subtree (mounted below) so the project
      # tree is Obsidian-visible and the workspace run operates on real files.
      - HERMES_WORKSPACES_ROOT=/vault/10_Projects
      # Optional: 21st.dev "magic" MCP for the frontend/UX agents (modern UI refs +
      # component generation). Off unless a key is provided; agents fall back to the
      # ui-ux-pro-max / frontend-design skills + web search. Set in your env/.env.
      - TWENTYFIRST_API_KEY=${TWENTYFIRST_API_KEY:-}
      # - MAGIC_MCP_ARGS=-y @21st-dev/magic@latest   # override the launch command if needed
      # Safety substrate (B1) — active in production; both are fail-safe + conservative.
      - HERMES_TRUST_GATE=1 # gate autonomous/cron acts (blocks irreversible, logs decisions)
      - HERMES_BUDGET_GOVERNOR=1 # allocate compute budget per cron job + record spend
      # HERMES_BRAIN_INJECT left OFF until the brain stores are indexed (cold = latency, no gain)
    volumes:
      # Official data dir: holds config.yaml, .env, sessions, memory, skills.
      # scripts/install.sh seeds ~/.hermes from hermes/ (config, .env, skills, profiles).
      - "${HOME}/.hermes:/opt/data"
      # Skill manifests (tool.yaml) for the Agent-Tools Launchpad — read-only.
      - "./.claude/skills:/opt/skills:ro"
      # Obsidian vault (read-only) — the Memory screen's live graph/search + Brain read from here.
      - "${VAULT_DIR:-${HOME}/Documents/Obsidian/Vault}:/vault:ro"
      # Nested read-WRITE mount for the Brands subtree only: an in-container Forge
      # run writes brand artifacts here so they land in the real vault and the
      # /v1/tools/{id}/artifacts endpoints can read them back. Placed AFTER the
      # ":/vault:ro" line so the more-specific later mount wins for this subpath.
      - "${VAULT_DIR:-${HOME}/Documents/Obsidian/Vault}/30_Resources/Brands:/vault/30_Resources/Brands:rw"
      # Same pattern for the brainstorm swarm: its session folders (qna.json,
      # readiness.json, prd.md, steering CLAUDE.md, ruflo state) are written here
      # so they live in the real vault and survive restarts. Matches HERMES_BRAINSTORM_ROOT.
      - "${VAULT_DIR:-${HOME}/Documents/Obsidian/Vault}/30_Resources/Brainstorms:/vault/30_Resources/Brainstorms:rw"
      # Same pattern for the Flow Cinematography Director: its session folders
      # (knowledge-base.md, look-bible.md, shot-list.md, flow-prompts.md/.txt,
      # review.json, uploaded review media under assets/) are written here so they
      # land in the real vault. Matches the flow-director tool's artifacts_root.
      - "${VAULT_DIR:-${HOME}/Documents/Obsidian/Vault}/30_Resources/Flow:/vault/30_Resources/Flow:rw"
      # Workspaces: the SDLC pipeline clones/copies projects here and the agent team
      # builds + tests against them, so 10_Projects must be read-WRITE in-container.
      # Matches HERMES_WORKSPACES_ROOT. (agent-home itself lives here — the whole
      # projects tree becomes writable to the engine.)
      - "${VAULT_DIR:-${HOME}/Documents/Obsidian/Vault}/10_Projects:/vault/10_Projects:rw"
    ports:
      - "127.0.0.1:8642:8642" # OpenAI-compatible API + /health
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # /health is unauthenticated; curl is installed in the engine image.
      # start-period matches the Dockerfile HEALTHCHECK to allow s6 init +
      # lazy-dep install + API server bind before the first probe fires.
      test: ["CMD", "curl", "-sf", "http://localhost:8642/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    depends_on:
      searxng:
        condition: service_healthy
      crawl4ai:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  searxng: # self-hosted web search (replaces Firecrawl/Tavily)
    image: searxng/searxng:latest # verify/pin
    container_name: agenthome-searxng
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    volumes:
      - ./infra/searxng:/etc/searxng:rw
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      # searxng exposes /healthz (confirmed in webapp.py). Uses wget — no curl
      # in the searxng image. -q silences output; -O- discards body; --spider
      # avoids reading the body for a faster check.
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  crawl4ai: # self-hosted scrape/extract (page -> markdown)
    image: unclecode/crawl4ai:latest # verify/pin
    container_name: agenthome-crawl4ai
    restart: unless-stopped
    shm_size: "1g"
    ports:
      - "127.0.0.1:11235:11235"
    healthcheck:
      # crawl4ai's own image healthcheck uses curl /health — we mirror it here
      # so compose depends_on can gate on service_healthy.
      test: ["CMD", "curl", "-sf", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  qdrant: # vector memory over the vault (semantic recall)
    image: qdrant/qdrant:latest # verify/pin
    container_name: agenthome-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      # Host publish on 6533 to avoid clashing with other local Qdrant instances
      # (e.g. jarvis on 6333). In-network service is still qdrant:6333.
      - "127.0.0.1:6533:6333"
    healthcheck:
      # qdrant image has no nc/curl/wget but does ship bash — probe the REST
      # port (6333) with a bash /dev/tcp connect; a successful TCP connect = up.
      test: ["CMD-SHELL", "bash -c '(echo > /dev/tcp/localhost/6333)' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  dashboard: # Vite SPA mission control (static build served by nginx)
    build: ./dashboard
    container_name: agenthome-dashboard
    restart: unless-stopped
    # Static SPA + an nginx /api/hermes/ → engine proxy. The nginx template
    # entrypoint runs envsubst at start, injecting HERMES_URL + the bearer
    # API_SERVER_KEY (from env_file) so the key never ships in the image/browser.
    env_file:
      - path: ${HOME}/.hermes/.env # provides API_SERVER_KEY for the proxy
        required: false
    environment:
      - HERMES_URL=http://hermes:8642
    ports:
      - "127.0.0.1:3737:3737"
    healthcheck:
      # nginx:alpine ships busybox wget; probe the root path once it serves.
      # Use 127.0.0.1 (not localhost → ::1) since nginx binds IPv4 0.0.0.0:3737.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3737/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    depends_on:
      hermes:
        condition: service_healthy

volumes:
  qdrant_data:
