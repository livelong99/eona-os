# Minimal SearXNG config for agent use. JSON format is enabled so Hermes/Claude
# can consume results programmatically (it is OFF in the default config).
# Replace `secret_key` with a random value: `openssl rand -hex 32`.
use_default_settings: true

server:
  secret_key: "CHANGE_ME_run_openssl_rand_hex_32"
  limiter: false
  image_proxy: true

search:
  safe_search: 0
  formats:
    - html
    - json
