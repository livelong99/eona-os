# Agent OS dashboard — static SPA with client-side routing fallback.
server {
    listen 3737;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Tool reference-image + review-media uploads (images/video) go through the
    # /api/hermes proxy; the nginx default of 1MB 413s them. Allow large bodies
    # (the engine still enforces its own per-file + per-request caps upstream).
    client_max_body_size 200m;

    gzip on;
    gzip_comp_level 6;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # Hashed build assets — safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Model files must 404 when absent — without this the SPA fallback below
    # serves index.html for a missing .onnx, defeating the wake-word presence
    # check and pulling the onnxruntime WASM needlessly.
    location /models/ {
        try_files $uri =404;
    }

    # Self-hosted onnxruntime-web runtime (.wasm/.mjs) — 404 if missing rather
    # than serving index.html (which onnxruntime would fail to parse as wasm).
    location /ort/ {
        try_files $uri =404;
    }

    # SPA fallback — every unknown path serves index.html so React Router
    # can resolve it client-side (e.g. /workspace/:id on a hard refresh).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hermes API proxy → engine. envsubst (nginx template entrypoint) injects
    # ${HERMES_URL} and the bearer ${API_SERVER_KEY} at container start, so the
    # key never ships in the image or reaches the browser. nginx runtime vars
    # ($host, $uri) aren't env vars, so envsubst leaves them intact.
    location /api/hermes/ {
        proxy_pass ${HERMES_URL}/;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Bearer ${API_SERVER_KEY}";
        # The engine rejects cross-origin POSTs (CSRF guard). The browser→nginx
        # hop is same-origin, so strip Origin/Referer on the upstream request.
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_buffering off;          # stream SSE (reply tokens) without buffering
    }
}
