name: 💡 Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the pain point or use case — focus on the problem, not just a solution.
      placeholder: I'm always frustrated when…
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen? Sketches, API shapes, or UI ideas welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about or worked around.
  - type: dropdown
    id: component
    attributes:
      label: Area
      options:
        - Dashboard (UI)
        - Engine / orchestration
        - Memory / vault
        - Skills / tools
        - Install / deployment
        - Docs
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and discussions for this idea
          required: true
